services:
  shakti-game-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: game
      POSTGRES_PASSWORD: game
      POSTGRES_DB: shakti_game
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - shakti-game-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U game -d shakti_game"]
      interval: 5s
      timeout: 5s
      retries: 5

  shakti-game-engine:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://game:game@shakti-game-db:5432/shakti_game
      RUST_LOG: ${RUST_LOG:-info}
      APP_PORT: "8010"
      GAME_ENGINE_LLM_MODE: ${GAME_ENGINE_LLM_MODE:-mock}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.2}
      # OPENAI_API_KEY: optional; otherwise mount openai.key.secret (see README)
    ports:
      - "127.0.0.1:8010:8010"
    depends_on:
      shakti-game-db:
        condition: service_healthy
    # Repo-root file (gitignored). Create it before `GAME_ENGINE_LLM_MODE=openai docker compose up`.
    volumes:
      - ./openai.key.secret:/app/openai.key.secret:ro

volumes:
  shakti-game-pg:
